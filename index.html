<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mucit Robot | Yapay Zeka & Robotik & IoT Teknolojileri</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* reset ve temel stiller - canvas absolute konumlandırıldı */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            overflow-x: hidden;
            background-color: #03050b;
        }

        /* canvas (three.js) tam ekran arka plan */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            outline: none;
        }

        /* tüm içerik canvas üzerinde */
        .content {
            position: relative;
            z-index: 10;
            background: transparent;
        }

        /* glassmorphism ve okunabilirlik için hafif blur katman */
        .glass-card, .navbar, .contact-form, .btn-primary, .btn-outline {
            backdrop-filter: blur(8px);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(5, 7, 15, 0.65);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-links a {
            color: #e2e8ff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a:hover { color: #0ff; }

        .mobile-menu {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .hero {
            min-height: 92vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .hero-content h1 {
            font-size: 3.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #7bc5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .hero-content p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 1rem auto;
            color: #cfdcff;
        }
        .cta-group {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0bced6, #0066ff);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0,150,255,0.3);
            transition: 0.3s;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            color: white;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(0,200,255,0.6);
        }
        .btn-outline {
            background: rgba(0,0,0,0.4);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            font-weight: 500;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline:hover {
            background: #0ff22a1a;
            box-shadow: 0 0 10px #0ff8;
        }

        section {
            padding: 5rem 7%;
        }
        .section-title {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 3rem;
            font-weight: 700;
        }
        .section-title span {
            background: linear-gradient(120deg, #0ff, #4d9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .services-grid, .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .glass-card {
            background: rgba(20, 25, 45, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: #0ff;
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0,200,255,0.2);
        }
        .service-item i {
            font-size: 2.5rem;
            color: #0ff;
            margin-bottom: 1rem;
        }
        .project-card img {
            width: 100%;
            border-radius: 1rem;
            margin-bottom: 1rem;
            background: #11151f;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
        }
        .logos i {
            font-size: 3rem;
            color: #ccd6ff;
            transition: 0.2s;
        }
        .logos i:hover { color:#0ff; transform: scale(1.1);}

        .contact-form {
            max-width: 650px;
            margin: 0 auto;
            padding: 2.5rem;
            background: rgba(10, 15, 30, 0.6);
            border-radius: 2rem;
            border: 1px solid #0ff77;
        }
        .input-group {
            margin-bottom: 1.3rem;
        }
        input, textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid #2c4570;
            border-radius: 1.5rem;
            color: white;
            font-family: 'Inter',sans-serif;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px #0ff6;
        }
        footer {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #0ff33;
        }
        .social-icons a {
            color: #b5c5ff;
            font-size: 1.5rem;
            margin: 0 0.8rem;
            transition: 0.2s;
        }
        .social-icons a:hover { color:#0ff;}

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                background: rgba(5, 7, 15, 0.95);
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                padding: 2rem;
                gap: 1rem;
                backdrop-filter: blur(20px);
            }
            .nav-links.active {
                display: flex;
            }
            .mobile-menu {
                display: block;
            }
            .hero-content h1 {
                font-size: 2.3rem;
            }
            section {
                padding: 3rem 5%;
            }
        }
    </style>
</head>
<body>
    <!-- Three.js Canvas buraya monte edilecek -->
    <div id="canvas-container"></div>

    <div class="content">
        <nav class="navbar">
            <div class="logo"><i class="fas fa-microchip"></i> MUCIT ROBOT</div>
            <div class="mobile-menu" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="https://www.linkedin.com/in/mucit-robot-249363217/"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/mucitrobot"><i class="fab fa-github"></i></a>
                <a href="https://twitter.com/mucitrobot"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com/mucitrobot"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/@MucitRobot"><i class="fab fa-youtube"></i></a>
            </div>
        </nav>

        <section id="home" class="hero">
            <div class="hero-content">
                <h1>Başımıza İcat Çıkar!</h1>
                <p>Yapay Zeka, Robotik, IoT ve yenilikçi teknolojilerle projelerinizi bir üst seviyeye taşıyoruz.</p>
                <div class="cta-group">
                    <a href="https://mesebilisim.com/urunler/" class="btn-primary">Meşe Bilişim <i class="fas fa-arrow-right"></i></a>
                    <a href="https://robotparcalari.com/" class="btn-outline">Mağaza</a>
                </div>
            </div>
        </section>

         

 
    </div>

    <!-- Three.js Kütüphaneleri -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Sahne ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b); // koyu uzay
        scene.fog = new THREE.FogExp2(0x03050b, 0.0008);

        // Kamera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.2);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // CSS2 renderer etiketler için (isteğe bağlı, dünya üstüne yazı vs)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        labelRenderer.domElement.style.zIndex = '5';
        container.appendChild(labelRenderer.domElement);
        
        // --- Yıldız Partikül Sistemi (arka plan) ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1800;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPositions[i*3] = (Math.random() - 0.5) * 800;
            starsPositions[i*3+1] = (Math.random() - 0.5) * 500;
            starsPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.22, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // ikinci yıldız katmanı (daha uzak, soluk)
        const starsGeometry2 = new THREE.BufferGeometry();
        const starsCount2 = 1200;
        const starsPositions2 = new Float32Array(starsCount2 * 3);
        for (let i = 0; i < starsCount2; i++) {
            starsPositions2[i*3] = (Math.random() - 0.5) * 1200;
            starsPositions2[i*3+1] = (Math.random() - 0.5) * 800;
            starsPositions2[i*3+2] = (Math.random() - 0.5) * 200 - 100;
        }
        starsGeometry2.setAttribute('position', new THREE.BufferAttribute(starsPositions2, 3));
        const starsMaterial2 = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.12, transparent: true, opacity: 0.5 });
        const stars2 = new THREE.Points(starsGeometry2, starsMaterial2);
        scene.add(stars2);
        
        // --- Dünya (küre) dokulu ---
        // Yüksek kaliteli dünya dokusu (three.js example'dan)
        const textureLoader = new THREE.TextureLoader();
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecularMap,
            specular: new THREE.Color('grey'),
            shininess: 5,
            normalMap: earthNormalMap,
            normalScale: new THREE.Vector2(0.8, 0.8)
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // Bulut katmanı (dönen)
        const cloudGeometry = new THREE.SphereGeometry(1.01, 128, 128);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudMap,
            transparent: true,
            opacity: 0.12,
            blending: THREE.AdditiveBlending
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // --- Işıklandırma ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 3, 5);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(2, 1, 2);
        scene.add(fillLight);
        
        // --- OrbitControls: fare ile döndürme/yakınlaştırma ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // atalet
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // Oto döndürme ile etkileşim: kullanıcı etkileşime geçince otoRotate'ı yavaşlat, 3sn sonra geri getir
        let autoRotateTimeout;
        controls.autoRotate = true;
        controls.addEventListener('start', () => {
            controls.autoRotate = false;
            if (autoRotateTimeout) clearTimeout(autoRotateTimeout);
        });
        controls.addEventListener('end', () => {
            autoRotateTimeout = setTimeout(() => {
                controls.autoRotate = true;
            }, 3000);
        });
        
        // --- Basit CSS etiketi ile "Mucit Robot" yazısı (isteğe bağlı) ---
        const div = document.createElement('div');
        div.textContent = '✨ MUCIT ROBOT ✨';
        div.style.color = '#0ff';
        div.style.fontSize = '20px';
        div.style.fontWeight = 'bold';
        div.style.textShadow = '0 0 10px #0ff';
        div.style.background = 'rgba(0,0,0,0.5)';
        div.style.padding = '4px 12px';
        div.style.borderRadius = '30px';
        div.style.border = '1px solid #0ff';
        div.style.backdropFilter = 'blur(4px)';
        const labelObj = new CSS2DObject(div);
        labelObj.position.set(1.6, 1.3, 0);
        scene.add(labelObj);
        
        // --- Animasyon ve döngü ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // autoRotate kontrolü yapılır
            // Bulutları yavaş döndür (farklı hızda)
            clouds.rotation.y += 0.0008;
            // Yıldızları çok yavaş döndür
            stars.rotation.y += 0.0001;
            stars2.rotation.x += 0.00005;
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        // --- Pencere yeniden boyutlandırma ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Konsola başarılı yükleme
        console.log('3D Dünya ve yıldızlar aktif | Fare ile döndürebilirsiniz');
    </script>

    <!-- Projeler içeriği ve form işleyişi (dinamik) -->
    <script type="text/javascript">
        (function() {
            // Proje verileri
            const projectsData = [
                { title: "Otonobil AI", desc: "Derin öğrenme ile şerit takibi ve engel tanıma sistemi.", img: "https://placehold.co/600x400/0a1a2a/0ff?text=Otonom+Robot" },
                { title: "Endüstriyel Kol", desc: "6 eksen robot kol - bilgisayarlı görü entegrasyonu.", img: "https://placehold.co/600x400/0a1a2a/0ff?text=Robot+Kol" },
                { title: "Yapay Zeka Sohbet Asistanı", desc: "Özel eğitilmiş LLM ile sektörel chatbot çözümü.", img: "https://placehold.co/600x400/0a1a2a/0ff?text=AI+Chatbot" }
            ];
            const grid = document.getElementById('projectsGrid');
            if(grid) {
                grid.innerHTML = projectsData.map(proj => `
                    <div class="project-card glass-card">
                        <img src="${proj.img}" alt="${proj.title}" loading="lazy">
                        <h3>${proj.title}</h3>
                        <p>${proj.desc}</p>
                        <div style="margin-top:1rem;"><a href="#" class="btn-outline" style="font-size:0.8rem;">Detaylar <i class="fas fa-chevron-right"></i></a></div>
                    </div>
                `).join('');
            }
            // Mobil menü işlevi
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const navLinks = document.getElementById('navLinks');
            if(mobileBtn) {
                mobileBtn.addEventListener('click', () => navLinks.classList.toggle('active'));
            }
            // Form simülasyonu
            const form = document.getElementById('demoContactForm');
            const feedback = document.getElementById('formFeedback');
            if(form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('name').value.trim();
                    const email = document.getElementById('email').value.trim();
                    if(!name || !email) {
                        feedback.innerText = "Lütfen ad ve e-posta alanlarını doldurun.";
                        feedback.style.color = "#ffaa88";
                        return;
                    }
                    if(!email.includes('@')) {
                        feedback.innerText = "Geçerli bir e-posta adresi girin.";
                        return;
                    }
                    feedback.innerHTML = `<i class="fas fa-check-circle"></i> Teşekkürler ${name}! En kısa sürede size dönüş yapacağız.`;
                    feedback.style.color = "#0ff";
                    form.reset();
                    setTimeout(() => feedback.innerHTML = '', 4000);
                });
            }
            // smooth scroll
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    const target = this.getAttribute('href');
                    if(target === "#" || target === "") return;
                    const el = document.querySelector(target);
                    if(el) {
                        e.preventDefault();
                        el.scrollIntoView({ behavior: 'smooth' });
                        if(navLinks) navLinks.classList.remove('active');
                    }
                });
            });
        })();
    </script>
</body>
</html>
