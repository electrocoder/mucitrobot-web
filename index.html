<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mucit Robot</title>

<style>
body {
    margin: 0;
    background: #020409;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* HERO */
.hero {
    position: absolute;
    z-index: 10;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.hero h1 {
    font-size: 48px;
    letter-spacing: 4px;
    margin: 0;
    color: cyan;
    text-shadow: 0 0 20px cyan;
}

.hero p {
    opacity: 0.7;
    margin-top: 10px;
}

.buttons {
    margin-top: 25px;
}

.btn {
    padding: 12px 25px;
    margin: 5px;
    border: 1px solid cyan;
    background: transparent;
    color: cyan;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: cyan;
    color: black;
    box-shadow: 0 0 20px cyan;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<div class="hero">
    <h1>MUCİT ROBOT</h1>
    <p>Yapay Zeka & Robotik Teknolojiler</p>
    <div class="buttons">
        <button class="btn">Projeler</button>
        <button class="btn">İletişim</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Küre
const geometry = new THREE.SphereGeometry(2, 64, 64);

const material = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.03
});

const sphere = new THREE.Points(geometry, material);
scene.add(sphere);

// Glow efekti (arka küre)
const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    transparent: true,
    opacity: 0.05
});

const glowSphere = new THREE.Mesh(
    new THREE.SphereGeometry(2.2, 32, 32),
    glowMaterial
);

scene.add(glowSphere);

// Particles
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 1000;

const posArray = new Float32Array(particlesCount * 3);

for(let i = 0; i < particlesCount * 3; i++){
    posArray[i] = (Math.random() - 0.5) * 20;
}

particlesGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(posArray, 3)
);

const particlesMaterial = new THREE.PointsMaterial({
    size: 0.01,
    color: 0x00ffff
});

const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

camera.position.z = 5;

// Mouse kontrol
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (event) => {
    mouseX = (event.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (event.clientY / window.innerHeight - 0.5) * 2;
});

// Animasyon
function animate() {
    requestAnimationFrame(animate);

    sphere.rotation.y += 0.003;
    sphere.rotation.x += mouseY * 0.01;

    glowSphere.rotation.y += 0.002;

    particles.rotation.y += 0.0005;

    sphere.rotation.y += mouseX * 0.005;

    renderer.render(scene, camera);
}

animate();

// Responsive
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
